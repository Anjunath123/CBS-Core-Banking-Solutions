<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Core Banking</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .login-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #fff; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); width: 400px; overflow: hidden; }
        .login-header { background: #2c5282; color: #fff; padding: 24px; text-align: center; }
        .login-header h2 { font-size: 20px; margin-bottom: 4px; }
        .login-header p { font-size: 13px; opacity: 0.8; }
        .login-body { padding: 28px; }
        .login-body .form-group { margin-bottom: 16px; }
        .login-body .form-group label { margin-bottom: 6px; }
        .login-body .form-group input { width: 100%; }
        .login-body .btn { width: 100%; padding: 10px; font-size: 15px; }
        .login-footer { text-align: center; padding: 0 28px 24px; font-size: 13px; }
        .login-footer a { color: #2c5282; text-decoration: none; font-weight: 600; cursor: pointer; }
        .login-footer a:hover { text-decoration: underline; }
        .section { display: none; }
        .section.active { display: block; }
        .back-link { font-size: 13px; color: #2c5282; cursor: pointer; margin-bottom: 12px; display: inline-block; }
        .otp-display { background: #ebf4ff; border: 1px solid #bee3f8; border-radius: 6px; padding: 12px; text-align: center; margin: 12px 0; font-size: 18px; font-weight: 700; color: #2c5282; letter-spacing: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Core Banking Service</h1>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <!-- LOGIN SECTION -->
            <div id="loginSection" class="section active">
                <div class="login-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your account</p>
                </div>
                <div class="login-body">
                    <form id="loginForm" onsubmit="return false;">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="loginUsername" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" required>
                        </div>
                        <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
                    </form>
                </div>
                <div class="login-footer">
                    <a onclick="showSection('forgotSection')">Forgot Password?</a>
                    &nbsp;&nbsp;|&nbsp;&nbsp;
                    <a onclick="showSection('registerSection')">Create Account</a>
                </div>
            </div>

            <!-- REGISTER SECTION -->
            <div id="registerSection" class="section">
                <div class="login-header">
                    <h2>Create Account</h2>
                    <p>Register a new user</p>
                </div>
                <div class="login-body">
                    <a class="back-link" onclick="showSection('loginSection')">&larr; Back to Login</a>
                    <form id="registerForm" onsubmit="return false;">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="regFullName" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="regEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="regUsername" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="regPassword" required minlength="6">
                        </div>
                        <button class="btn btn-primary" onclick="doRegister()">Register</button>
                    </form>
                </div>
            </div>

            <!-- FORGOT PASSWORD SECTION -->
            <div id="forgotSection" class="section">
                <div class="login-header">
                    <h2>Forgot Password</h2>
                    <p>Enter your username to receive OTP</p>
                </div>
                <div class="login-body">
                    <a class="back-link" onclick="showSection('loginSection')">&larr; Back to Login</a>
                    <form id="forgotForm" onsubmit="return false;">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="forgotUsername" required>
                        </div>
                        <button class="btn btn-primary" onclick="doForgotPassword()">Send OTP</button>
                    </form>
                    <div id="otpDisplay" style="display:none;"></div>
                </div>
            </div>

            <!-- RESET PASSWORD SECTION -->
            <div id="resetSection" class="section">
                <div class="login-header">
                    <h2>Reset Password</h2>
                    <p>Enter OTP and new password</p>
                </div>
                <div class="login-body">
                    <a class="back-link" onclick="showSection('forgotSection')">&larr; Back</a>
                    <form id="resetForm" onsubmit="return false;">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="resetUsername" readonly>
                        </div>
                        <div class="form-group">
                            <label>OTP</label>
                            <input type="text" id="resetOtp" required maxlength="6" placeholder="Enter 6-digit OTP">
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" id="resetNewPassword" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" id="resetConfirmPassword" required minlength="6">
                        </div>
                        <button class="btn btn-primary" onclick="doResetPassword()">Reset Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="js/login.js"></script>
</body>
</html>
